name: CI

on:
  push:
    branches: [main, claude/repo-review-assessment-RDhoO]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: vendly_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./Back-end

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Back-end/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/vendly_test
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/vendly_test
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/vendly_test
          JWT_SECRET: test-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          APP_KEY: test-key
        run: npm run test -- --passWithNoTests

      - name: Run e2e tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/vendly_test
          JWT_SECRET: test-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          APP_KEY: test-key
          PORT: 4001
        run: npm run test:e2e -- --passWithNoTests

  frontend-test:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Front-End

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: Front-End/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests --watchAll=false

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
        run: npm run build

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend audit
        working-directory: ./Back-end
        run: npm audit --audit-level=critical || true

      - name: Frontend audit
        working-directory: ./Front-End
        run: npm audit --audit-level=critical || true
